<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1A1A2E">
<link rel="apple-touch-icon" href="iprot_icon.png">
<link rel="manifest" href="manifest.json">
<title>iProT – Turni & Promemoria</title>
<style>
  :root {
    --bg:      #1A1A2E;
    --panel:   #16213E;
    --cell:    #0F3460;
    --accent:  #E94560;
    --gold:    #F5A623;
    --fg:      #E0E0E0;
    --fg-dim:  #7A8BA0;
    --today:   #FFD60A;
    --prom:    #FF6B35;
    --alleg:   #4CC9F0;
    --verde:   #27AE60;
    --radius:  12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
    overflow-y: hidden;
    position: fixed;
    width: 100%;
    height: 100%;
  }

  /* ── TOP BAR ── */
  .topbar {
    background: var(--panel);
    padding: 8px 16px 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }
  .topbar-nav { display: flex; align-items: center; gap: 6px; }
  .nav-btn {
    background: var(--cell);
    color: var(--fg);
    border: none;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 16px;
    cursor: pointer;
    touch-action: manipulation;
  }
  .nav-btn:active { background: #1a5a9e; }
  .month-label {
    font-size: 18px;
    font-weight: 700;
    color: var(--gold);
    cursor: pointer;
    text-align: center;
    flex: 1;
    padding: 0 6px;
  }
  .today-btn {
    background: var(--today);
    color: #111;
    border: none;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    touch-action: manipulation;
    white-space: nowrap;
  }
  .today-btn:active { filter: brightness(0.9); }

  /* ── SELETTORE SQUADRA ── */
  .squadra-bar {
    background: var(--bg);
    display: flex;
    gap: 6px;
    padding: 6px 10px;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .squadra-bar::-webkit-scrollbar { display: none; }
  .sq-btn {
    flex-shrink: 0;
    background: var(--panel);
    color: var(--fg-dim);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    touch-action: manipulation;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .sq-btn.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .sq-btn:active { filter: brightness(0.85); }

  /* ── ANIMAZIONI CALENDARIO ── */
  .cal-slide-left  { animation: slideLeft  0.3s ease; }
  .cal-slide-right { animation: slideRight 0.3s ease; }
  @keyframes slideLeft  { from { transform: translateX(100%);  opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes slideRight { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* ── CALENDARIO ── */
  .calendar-wrap { padding: 8px 6px; flex: 1; overflow: hidden; }
  .day-headers {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    margin-bottom: 2px;
  }
  .day-header {
    text-align: center;
    font-size: 10px;
    font-weight: 700;
    padding: 5px 2px;
    border-radius: 5px;
    background: var(--panel);
    color: var(--fg-dim);
  }
  .day-header.domenica { background: var(--accent); color: white; }
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }
  .day-cell {
    border-radius: 7px;
    padding: 5px 3px 3px;
    min-height: 60px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    transition: filter 0.15s, transform 0.1s;
    touch-action: manipulation;
  }
  .day-cell:active { filter: brightness(1.3); transform: scale(0.96); }
  .day-cell.empty  { background: transparent; cursor: default; }
  .day-cell.today  { outline: 3px solid var(--today); outline-offset: -2px; }
  .day-num {
    font-size: 16px;
    font-weight: 700;
    color: white;
    line-height: 1;
  }
  .turno-label {
    font-size: 0px; /* nascosto */
  }
  .badges {
    display: flex;
    gap: 2px;
    margin-top: 3px;
    font-size: 10px;
  }

  /* ── LEGENDA ── */
  .legenda {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 8px 12px;
    background: var(--panel);
  }
  .legenda-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 9px;
    color: var(--fg-dim);
  }
  .legenda-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    background: var(--panel);
    display: flex;
    justify-content: space-around;
    padding: 6px 0 max(6px, env(safe-area-inset-bottom));
    position: sticky;
    bottom: 0;
    box-shadow: 0 -2px 12px rgba(0,0,0,0.4);
  }
  .bottom-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    background: none;
    border: none;
    color: var(--fg-dim);
    font-size: 9px;
    cursor: pointer;
    padding: 4px 12px;
    border-radius: 10px;
    touch-action: manipulation;
  }
  .bottom-btn .icon { font-size: 20px; }
  .bottom-btn:active { color: var(--gold); background: rgba(245,166,35,0.1); }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--panel);
    border-radius: var(--radius) var(--radius) 0 0;
    width: 100%;
    max-width: 600px;
    max-height: 90dvh;
    overflow-y: auto;
    padding: 20px 20px max(20px, env(safe-area-inset-bottom));
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle {
    width: 40px; height: 4px;
    background: var(--fg-dim);
    border-radius: 2px;
    margin: 0 auto 16px;
  }
  .modal-title { font-size: 18px; font-weight: 700; color: var(--gold); margin-bottom: 16px; }
  .modal-header-colored { border-radius: 10px; padding: 14px 16px; margin-bottom: 16px; }
  .modal-header-colored h2 { font-size: 16px; font-weight: 700; color: white; text-transform: uppercase; }
  .modal-header-colored p  { font-size: 13px; color: rgba(255,255,255,0.8); margin-top: 4px; }

  /* ── FORM ── */
  label { font-size: 12px; color: var(--fg-dim); display: block; margin-bottom: 4px; margin-top: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  textarea, input[type=text], input[type=number] {
    width: 100%; background: var(--bg); color: var(--fg);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
    padding: 10px 12px; font-size: 15px; font-family: inherit; outline: none; resize: none;
  }
  textarea:focus, input:focus { border-color: var(--accent); }
  .radio-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
  .radio-btn {
    background: var(--bg); border: 1px solid rgba(255,255,255,0.15);
    color: var(--fg); border-radius: 20px; padding: 6px 14px;
    font-size: 13px; cursor: pointer; touch-action: manipulation;
  }
  .radio-btn.selected { background: var(--accent); border-color: var(--accent); color: white; font-weight: 700; }

  /* ── BUTTONS ── */
  .btn {
    display: block; width: 100%; padding: 14px; border: none;
    border-radius: 10px; font-size: 15px; font-weight: 700;
    cursor: pointer; margin-top: 10px; touch-action: manipulation; font-family: inherit;
  }
  .btn:active { filter: brightness(0.85); }
  .btn-accent { background: var(--accent); color: white; }
  .btn-verde  { background: var(--verde);  color: white; }
  .btn-cell   { background: var(--cell);   color: white; }
  .btn-sm {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 6px 12px; border: none; border-radius: 8px;
    font-size: 13px; font-weight: 700; cursor: pointer; touch-action: manipulation; font-family: inherit;
  }
  .btn-sm:active { filter: brightness(0.85); }

  /* ── LISTE ── */
  .prom-item {
    background: var(--bg); border-radius: 10px; padding: 12px 14px;
    margin-bottom: 8px; display: flex; align-items: flex-start; gap: 10px;
  }
  .prom-text  { flex: 1; font-size: 14px; line-height: 1.5; }
  .prom-badge { font-size: 11px; color: var(--prom); margin-top: 4px; }
  .prom-actions { display: flex; gap: 6px; flex-shrink: 0; margin-top: 2px; }
  .empty-msg { text-align: center; color: var(--fg-dim); font-size: 13px; padding: 16px; background: var(--bg); border-radius: 10px; }
  .avviso-item { background: var(--bg); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; border-left: 4px solid var(--prom); font-size: 14px; line-height: 1.5; }
  .avviso-item.ritardo { border-left-color: var(--accent); }
  .avviso-item.oggi    { border-left-color: var(--today); }

  /* ── RICERCA ── */
  .search-wrap { position: relative; margin-bottom: 12px; }
  .search-wrap input { padding-left: 36px; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--fg-dim); font-size: 16px; pointer-events: none; }

  /* ── PICKER MESE ── */
  .month-picker { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 12px 0; }
  .month-pick-btn { background: var(--bg); color: var(--fg); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px; font-size: 13px; cursor: pointer; text-align: center; touch-action: manipulation; }
  .month-pick-btn.selected { background: var(--accent); color: white; border-color: var(--accent); font-weight: 700; }
  .year-row { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 8px; }
  .year-nav { background: var(--cell); color: white; border: none; border-radius: 8px; padding: 8px 16px; font-size: 18px; cursor: pointer; touch-action: manipulation; }
  .year-display { font-size: 22px; font-weight: 700; color: var(--gold); min-width: 80px; text-align: center; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--cell); border-radius: 2px; }

  @media (min-width: 480px) {
    .modal { border-radius: var(--radius); margin: 20px; max-height: 85dvh; }
    .modal-overlay { align-items: center; }
    .day-cell { min-height: 80px; }
    .day-num  { font-size: 20px; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-nav">
    <button class="nav-btn" onclick="cambiaMs(-1)">◀</button>
  </div>
  <div class="month-label" onclick="apriPickerMese()" id="lblMese">—</div>
  <div class="topbar-nav">
    <button class="nav-btn" onclick="cambiaMs(1)">▶</button>
    <button class="today-btn" onclick="vaiOggi()">🏠 Oggi</button>
  </div>
</div>

<!-- SELETTORE SQUADRA -->
<div class="squadra-bar" id="squadraBar"></div>

<!-- CALENDARIO -->
<div class="calendar-wrap">
  <div class="day-headers">
    <div class="day-header">Lun</div>
    <div class="day-header">Mar</div>
    <div class="day-header">Mer</div>
    <div class="day-header">Gio</div>
    <div class="day-header">Ven</div>
    <div class="day-header">Sab</div>
    <div class="day-header domenica">Dom</div>
  </div>
  <div class="calendar-grid" id="calGrid"></div>
</div>

<!-- LEGENDA -->
<div class="legenda">
  <div class="legenda-item"><div class="legenda-dot" style="background:#5B9BD5"></div>Mattino</div>
  <div class="legenda-item"><div class="legenda-dot" style="background:#2E8B57"></div>Pomeriggio</div>
  <div class="legenda-item"><div class="legenda-dot" style="background:#1C1C6E"></div>Notte</div>
  <div class="legenda-item"><div class="legenda-dot" style="background:#6C757D"></div>Riposo</div>
  <div class="legenda-item">📌 Promemoria</div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="bottom-btn" onclick="apriListaPromemoria()"><span class="icon">📋</span><span>Tutti</span></button>
  <button class="bottom-btn" onclick="controllaAvvisi(true)"><span class="icon">🔔</span><span>Avvisi</span></button>
  <button class="bottom-btn" onclick="esportaDati()"><span class="icon">💾</span><span>Esporta</span></button>
  <button class="bottom-btn" onclick="importaDati()"><span class="icon">📥</span><span>Importa</span></button>
</div>

<!-- ══ MODAL DETTAGLI GIORNO ══ -->
<div class="modal-overlay" id="modalGiorno">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header-colored" id="giornoHeader"></div>
    <div style="font-size:13px;font-weight:700;color:var(--fg-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">📝 PROMEMORIA</div>
    <div id="listaProm"></div>
    <button class="btn btn-verde" onclick="apriNuovoProm()">➕ Aggiungi Promemoria</button>
    <button class="btn btn-cell" onclick="chiudiModal('modalGiorno')" style="margin-top:6px">Chiudi</button>
  </div>
</div>

<!-- ══ MODAL NUOVO/MODIFICA PROMEMORIA ══ -->
<div class="modal-overlay" id="modalProm">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="promModalTitolo">➕ Nuovo Promemoria</div>
    <label>Testo</label>
    <textarea id="promTesto" rows="4" placeholder="Descrivi il promemoria..."></textarea>
    <label>Ricordamelo</label>
    <div class="radio-group" id="anticipoGroup">
      <div class="radio-btn selected" data-val="0">Solo il giorno</div>
      <div class="radio-btn" data-val="2">Ogni giorno per 2gg</div>
      <div class="radio-btn" data-val="5">Ogni giorno per 5gg</div>
      <div class="radio-btn" data-val="10">Ogni giorno per 10gg</div>
    </div>
    <label>Personalizzato (giorni prima)</label>
    <input type="number" id="anticipoCustom" min="0" max="365" placeholder="es. 7">
    <button class="btn btn-verde" onclick="salvaProm()">💾 Salva</button>
    <button class="btn btn-accent" onclick="chiudiModal('modalProm')" style="margin-top:6px">Annulla</button>
  </div>
</div>

<!-- ══ MODAL LISTA TUTTI PROMEMORIA ══ -->
<div class="modal-overlay" id="modalLista">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">📋 Tutti i Promemoria</div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Cerca promemoria..." oninput="filtraPromemoria()">
    </div>
    <div id="listaPromAll"></div>
    <button class="btn btn-accent" onclick="chiudiModal('modalLista')" style="margin-top:12px">Chiudi</button>
  </div>
</div>

<!-- ══ MODAL AVVISI ══ -->
<div class="modal-overlay" id="modalAvvisi">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">⏰ Promemoria in attesa</div>
    <div id="listaAvvisi"></div>
    <button class="btn btn-accent" onclick="chiudiModal('modalAvvisi')" style="margin-top:12px">OK – Ho capito</button>
  </div>
</div>

<!-- ══ MODAL PICKER MESE ══ -->
<div class="modal-overlay" id="modalMese">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">📅 Vai al mese</div>
    <div class="year-row">
      <button class="year-nav" onclick="cambiaAnnoP(-1)">◀</button>
      <div class="year-display" id="pickerAnno">2026</div>
      <button class="year-nav" onclick="cambiaAnnoP(1)">▶</button>
    </div>
    <div class="month-picker" id="monthPickerGrid"></div>
    <button class="btn btn-accent" onclick="chiudiModal('modalMese')">Annulla</button>
  </div>
</div>

<input type="file" id="importFile" accept=".json" style="display:none" onchange="leggiImport(event)">

function chiaveData(y,m,d) { return `${y}-${m}-${d}`; }

// ══════════════════════════════════════════════
//  LOGICA TURNI
// ══════════════════════════════════════════════
function getTurno(y, m, d, numSquadra) {
  const sq  = SQUADRE[numSquadra];
  const key = `${y}-${m}-${d}`;
  if (sq.eccezioni[key]) return sq.eccezioni[key];

  const data     = new Date(y, m-1, d);
  const DATA_INI = new Date(2024, 0, 1);
  let ref;

  const r2026 = sq.riprese[2026];
  const r2025 = sq.riprese[2025];
  const r2024 = sq.riprese[2024];

  if (data >= r2026)      ref = r2026;
  else if (data >= r2025) ref = r2025;
  else if (data >= r2024) ref = r2024;
  else                    ref = DATA_INI;

  const diff = Math.round((data - ref) / 86400000);
  const idx  = ((diff + sq.indiceInizio) % 15 + 15) % 15;

  // Calcola indice di partenza della ref
  let idxRef;
  if (ref === DATA_INI) {
    idxRef = sq.indiceInizio;
  } else {
    // La data di ripresa ha lo stesso indice dell'inizio
    idxRef = sq.indiceInizio;
  }

  const idxFinale = ((diff + idxRef) % 15 + 15) % 15;
  return CICLO[idxFinale];
}

function coloreTurno(turno) {
  for (const [k, v] of Object.entries(COLORI)) {
    if (turno.startsWith(k)) return v;
  }
  return '#3A3A3C';
}

function carica() {
  const sq  = localStorage.getItem('turni_squadra');
  if (sq) stato.squadraAttiva = parseInt(sq);

  const raw = localStorage.getItem('turni_prom');
  if (raw) {
    try {
      const data = JSON.parse(raw);
      const norm = {};
      Object.entries(data).forEach(([key, val]) => {
        const [y, m, d] = key.split('-').map(Number);
        norm[`${y}-${m}-${d}`] = val;
      });
      stato.promemoria = norm;
    } catch(e) {}
  }
}

// ══════════════════════════════════════════════
function creaCalendario(mese, anno) {
  stato.mese = mese;
  stato.anno = anno;

  const nomeM = MESI_IT[mese-1].toUpperCase() + ' ' + anno;
  document.getElementById('lblMese').textContent = nomeM;
  document.title = 'iProT – ' + nomeM;

  const grid    = document.getElementById('calGrid');
  grid.innerHTML = '';

  const oggi    = new Date();
  const oggiStr = chiaveData(oggi.getFullYear(), oggi.getMonth()+1, oggi.getDate());

  let primoGiorno = new Date(anno, mese-1, 1).getDay();
  primoGiorno = (primoGiorno === 0) ? 6 : primoGiorno - 1;

  const giorniMese = new Date(anno, mese, 0).getDate();

  for (let i = 0; i < primoGiorno; i++) {
    const e = document.createElement('div');
    e.className = 'day-cell empty';
    grid.appendChild(e);
  }

  for (let g = 1; g <= giorniMese; g++) {
    const turno  = getTurno(anno, mese, g, stato.squadraAttiva);
    const bg     = coloreTurno(turno);
    const key    = chiaveData(anno, mese, g);
    const nProm  = (stato.promemoria[key] || []).length;
    const isOggi = key === oggiStr;

    const cell = document.createElement('div');
    cell.className = 'day-cell' + (isOggi ? ' today' : '');
    cell.style.background = bg;
    cell.onclick = () => apriGiorno(anno, mese, g);
    cell.innerHTML = `
      <div class="day-num">${g}</div>
      <div class="turno-label"></div>
      ${nProm > 0 ? `<div class="badges"><span style="font-size:18px">📌</span>${nProm > 1 ? `<span style="font-size:9px;color:rgba(255,255,255,0.8)">${nProm}</span>` : ''}</div>` : ''}
    `;
    grid.appendChild(cell);
  }
}

function cambiaMs(delta) {
  let m = stato.mese + delta, a = stato.anno;
  if (m > 12) { m = 1;  a++; }
  if (m < 1)  { m = 12; a--; }
  const grid   = document.getElementById('calGrid');
  const classe = delta > 0 ? 'cal-slide-left' : 'cal-slide-right';
  grid.classList.remove('cal-slide-left', 'cal-slide-right');
  creaCalendario(m, a);
  void grid.offsetWidth;
  grid.classList.add(classe);
  setTimeout(() => grid.classList.remove(classe), 300);
}

function vaiOggi() {
  const d = new Date();
  creaCalendario(d.getMonth()+1, d.getFullYear());
}

function apriGiorno(y, m, d) {
  stato.giornoSelezionato = {y, m, d};
  const turno = getTurno(y, m, d, stato.squadraAttiva);
  const bg    = coloreTurno(turno);
  const data  = new Date(y, m-1, d);
  const gg    = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
  const hdr   = document.getElementById('giornoHeader');
  const nomeSq = SQUADRE[stato.squadraAttiva].nome;
  hdr.style.background = bg;
  hdr.innerHTML = `
    <h2>${gg[data.getDay()]} ${String(d).padStart(2,'0')}/${String(m).padStart(2,'0')}/${y}</h2>
    <p>🔹 ${turno} &nbsp;·&nbsp; ${nomeSq}</p>
  `;
  aggiornaListaProm();
  apriModal('modalGiorno');
}

function aggiornaListaProm() {
  const {y, m, d} = stato.giornoSelezionato;
  const key  = chiaveData(y, m, d);
  const list = stato.promemoria[key] || [];
  const div  = document.getElementById('listaProm');
  if (list.length === 0) {
    div.innerHTML = '<div class="empty-msg">Nessun promemoria per questo giorno</div>';
    return;
  }
  div.innerHTML = list.map((p, i) => {
    const ant   = p.anticipo || 0;
    const badge = ant > 0 ? `<div class="prom-badge">🔔 Ogni giorno per ${ant}gg prima</div>` : '';
    return `<div class="prom-item">
      <div style="flex:1">
        <div class="prom-text">${escHtml(p.testo)}</div>${badge}
      </div>
      <div class="prom-actions">
        <button class="btn-sm" style="background:var(--gold);color:#111" onclick="apriModificaProm(${i})">✏️</button>
        <button class="btn-sm" style="background:var(--accent);color:white" onclick="eliminaProm(${i})">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

  document.getElementById('promTesto').value = '';
  document.getElementById('anticipoCustom').value = '';
  setAnticipo(0);
  apriModal('modalProm');
}

function apriModificaProm(idx) {
  const {y, m, d} = stato.giornoSelezionato;
  const p = stato.promemoria[chiaveData(y,m,d)][idx];
  stato.promEditIdx = idx;
  document.getElementById('promModalTitolo').textContent = '✏️ Modifica Promemoria';
  document.getElementById('promTesto').value = p.testo;
  document.getElementById('anticipoCustom').value = '';
  setAnticipo(p.anticipo || 0);
  apriModal('modalProm');
}

function setAnticipo(val) {
  stato.anticipoSelezionato = val;
  document.querySelectorAll('#anticipoGroup .radio-btn').forEach(b => {
    b.classList.toggle('selected', parseInt(b.dataset.val) === val);
  });
}

document.querySelectorAll('#anticipoGroup .radio-btn').forEach(b => {
  b.onclick = () => setAnticipo(parseInt(b.dataset.val));
});

document.getElementById('anticipoCustom').onchange = function() {
  const v = parseInt(this.value);
  if (!isNaN(v) && v >= 0) setAnticipo(v);
};

function salvaProm() {
  const testo = document.getElementById('promTesto').value.trim();
  if (!testo) { alert('Inserisci un testo!'); return; }
  const {y, m, d} = stato.giornoSelezionato;
  const key = chiaveData(y, m, d);
  if (!stato.promemoria[key]) stato.promemoria[key] = [];
  const entry = { testo, anticipo: stato.anticipoSelezionato, data_creazione: new Date().toISOString().slice(0,19).replace('T',' ') };
  if (stato.promEditIdx !== null) {
    stato.promemoria[key][stato.promEditIdx] = entry;
  } else {
    stato.promemoria[key].push(entry);
  }
  salva();
  chiudiModal('modalProm');
  aggiornaListaProm();
  creaCalendario(stato.mese, stato.anno);
}

function eliminaProm(idx) {
  if (!confirm('Eliminare questo promemoria?')) return;
  const {y, m, d} = stato.giornoSelezionato;
  const key = chiaveData(y, m, d);
  stato.promemoria[key].splice(idx, 1);
  if (stato.promemoria[key].length === 0) delete stato.promemoria[key];
  salva();
  aggiornaListaProm();
  creaCalendario(stato.mese, stato.anno);
}

function filtraPromemoria() {
  const filtro  = document.getElementById('searchInput').value.toLowerCase();
  const div     = document.getElementById('listaPromAll');
  const entries = Object.entries(stato.promemoria).sort();
  if (entries.length === 0) {
    div.innerHTML = '<div class="empty-msg">Nessun promemoria salvato</div>';
    return;
  }
  let html = '';
  entries.forEach(([key, lista]) => {
    const [y,m,d] = key.split('-');
    lista.forEach((p) => {
      const ant  = p.anticipo || 0;
      const voce = `${String(d).padStart(2,'0')}/${String(m).padStart(2,'0')}/${y}  ${p.testo}`;
      if (filtro && !voce.toLowerCase().includes(filtro)) return;
      html += `<div class="prom-item"><div style="flex:1">
        <div style="font-size:11px;color:var(--fg-dim);margin-bottom:3px">${String(d).padStart(2,'0')}/${String(m).padStart(2,'0')}/${y}</div>
        <div class="prom-text">${escHtml(p.testo)}</div>
        ${ant > 0 ? `<div class="prom-badge">🔔 ${ant}gg prima</div>` : ''}
      </div></div>`;
    });
  });
  div.innerHTML = html || '<div class="empty-msg">Nessun risultato</div>';
}

function controllaAvvisi(mostraSempre = false) {
  const oggi = new Date(); oggi.setHours(0,0,0,0);
  const ultimoStr = localStorage.getItem('turni_ultimo');
  const ultimo = ultimoStr ? new Date(ultimoStr) : new Date(oggi.getTime() - 7*86400000);
  ultimo.setHours(0,0,0,0);
  const avvisi = [], visti = new Set();
  let cur = new Date(ultimo.getTime() + 86400000);
  if (cur > oggi) cur = new Date(oggi);
  while (cur <= oggi) {
    Object.entries(stato.promemoria).forEach(([key, lista]) => {
      const [ky, km, kd] = key.split('-').map(Number);
      const dataEvento = new Date(ky, km-1, kd); dataEvento.setHours(0,0,0,0);
      const giorniMancanti = Math.round((dataEvento - cur) / 86400000);
      lista.forEach((p, idx) => {
        const ant    = p.anticipo || 0;
        const chiave = `${key}-${p.testo}-${ant}-${idx}`;
        if (visti.has(chiave)) return;
        const scatta = (ant === 0 && cur.getTime() === dataEvento.getTime()) ||
                       (ant > 0  && giorniMancanti >= 0 && giorniMancanti <= ant);
        if (scatta) { avvisi.push({dataEvento, testo: p.testo, anticipo: ant, inRitardo: dataEvento < oggi}); visti.add(chiave); }
      });
    });
    cur = new Date(cur.getTime() + 86400000);
  }
  localStorage.setItem('turni_ultimo', oggi.toISOString().slice(0,10));
  if (avvisi.length === 0) {
    if (mostraSempre) {
      document.getElementById('listaAvvisi').innerHTML = '<div class="empty-msg">✅ Nessun promemoria in attesa</div>';
      apriModal('modalAvvisi');
    }
    return;
  }
  const oggi2 = new Date(); oggi2.setHours(0,0,0,0);
  document.getElementById('listaAvvisi').innerHTML = avvisi.map(a => {
    const ds = `${String(a.dataEvento.getDate()).padStart(2,'0')}/${String(a.dataEvento.getMonth()+1).padStart(2,'0')}/${a.dataEvento.getFullYear()}`;
    const gm = Math.round((a.dataEvento - oggi2) / 86400000);
    let cls = '', txt = '';
    if (a.inRitardo)  { cls='ritardo'; txt=`⚠️ <strong>SCADUTO</strong> (${ds}) – ${escHtml(a.testo)}`; }
    else if (gm === 0){ cls='oggi';    txt=`📌 <strong>OGGI</strong> (${ds}) – ${escHtml(a.testo)}`; }
    else               {               txt=`🔔 <strong>Tra ${gm}gg</strong> (${ds}) – ${escHtml(a.testo)}`; }
    return `<div class="avviso-item ${cls}">${txt}</div>`;
  }).join('');
  apriModal('modalAvvisi');
}

function esportaDati() {
  const blob = new Blob([JSON.stringify(stato.promemoria, null, 2)], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `backup_turni_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importaDati() { document.getElementById('importFile').click(); }

function leggiImport(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (confirm(`Importare ${Object.keys(data).length} voci? I dati attuali verranno uniti.`)) {
        const norm = {};
        Object.entries(data).forEach(([key, val]) => {
          const [y, m, d] = key.split('-').map(Number);
          norm[`${y}-${m}-${d}`] = val;
        });
        Object.assign(stato.promemoria, norm);
        salva();
        creaCalendario(stato.mese, stato.anno);
        alert('✅ Dati importati con successo!');
      }
    } catch(err) { alert('❌ File non valido.'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function apriModal(id)  { document.getElementById(id).classList.add('open'); }
function chiudiModal(id){ document.getElementById(id).classList.remove('open'); }
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
});

// ══════════════════════════════════════════════
//  SWIPE MESI
// ══════════════════════════════════════════════
let touchStartX = 0, touchCurrentX = 0, isDragging = false;

document.addEventListener('touchstart', e => {
  if (document.querySelector('.modal-overlay.open')) return;
  touchStartX = e.changedTouches[0].screenX;
  touchCurrentX = touchStartX;
  isDragging = true;
}, {passive: true});

document.addEventListener('touchmove', e => {
  if (!isDragging) return;
  if (document.querySelector('.modal-overlay.open')) return;
  touchCurrentX = e.changedTouches[0].screenX;
  const diffX = touchCurrentX - touchStartX;
  if (Math.abs(diffX) > 10) e.preventDefault();
  const grid = document.getElementById('calGrid');
  grid.style.transform = `translateX(${diffX * 0.4}px)`;
  grid.style.opacity   = `${1 - Math.abs(diffX) / 800}`;
}, {passive: false});

document.addEventListener('touchend', e => {
  if (!isDragging) return;
  isDragging = false;
  const grid = document.getElementById('calGrid');
  const diff = touchStartX - touchCurrentX;
  if (Math.abs(diff) > 60) {
    const dir = diff > 0 ? 1 : -1;
    grid.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
    grid.style.transform  = `translateX(${dir * -400}px)`;
    grid.style.opacity    = '0';
    setTimeout(() => {
      grid.style.transition = 'none';
      grid.style.transform  = 'translateX(0)';
      grid.style.opacity    = '1';
      cambiaMs(dir);
      const entrata = dir > 0 ? '400px' : '-400px';
      grid.style.transform = `translateX(${entrata})`;
      grid.style.opacity   = '0';
      void grid.offsetWidth;
      grid.style.transition = 'transform 0.25s ease, opacity 0.25s ease';
      grid.style.transform  = 'translateX(0)';
      grid.style.opacity    = '1';
      setTimeout(() => { grid.style.transition=''; grid.style.transform=''; grid.style.opacity=''; }, 250);
    }, 200);
  } else {
    grid.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
    grid.style.transform  = 'translateX(0)';
    grid.style.opacity    = '1';
    setTimeout(() => { grid.style.transition=''; grid.style.transform=''; grid.style.opacity=''; }, 200);
  }
}, {passive: true});
